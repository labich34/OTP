<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Planning Tech" />
<meta name="theme-color" content="#1c8f81" />
<link rel="manifest" href="manifest.json" />
<title>Planning Technicien — La Côte</title>

<!-- Polices : IBM Plex (registre "atelier / opérations") + IBM Plex Mono pour les horaires -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#26303f;         /* texte principal — ardoise foncé, lisible (pas noir pur) */
  --ink-soft:#5f6b7d;    /* texte secondaire */
  --paper:#d4e9f7;       /* fond appli — bleu ciel */
  --surface:#f8f2e5;     /* cartes — ivoire chaud (plus du tout blanc) */
  --line:#e6e0d2;        /* filets doux */
  --line-strong:#d5ccbb;
  --brand:#1c8f81;       /* teal frais et clair */
  --brand-ink:#157266;
  --free:#2a9d63;        /* disponible — vert frais */
  --free-bg:#e6f5ec;
  --busy:#cc3b3b;        /* occupé — rouge */
  --busy-bg:#fce3e3;
  --req:#c17d14;         /* demande en attente — ambre */
  --req-bg:#fdf2dc;
  --confirmed:#2f6cae;   /* confirmé — bleu (bien distinct du vert « libre ») */
  --confirmed-bg:#e7effb;
  --prio:#e0603f;        /* prioritaire Thibaut — corail chaleureux */
  --prio-bg:#fce9e2;
  --header-1:#eaf6f2;    /* en-tête clair (teal très pâle) */
  --header-2:#dcefe9;
  --radius:14px;
  --radius-sm:9px;
  --shadow-sm:0 1px 2px rgba(38,48,63,.06);
  --shadow:0 1px 2px rgba(38,48,63,.05), 0 10px 28px -16px rgba(38,48,63,.28);
  --shadow-lg:0 24px 60px -28px rgba(38,48,63,.45);
  --focus:0 0 0 3px rgba(28,143,129,.32);
}
*{box-sizing:border-box}
html,body{margin:0}
::selection{background:rgba(28,143,129,.22)}
:focus-visible{outline:none;box-shadow:var(--focus);border-radius:8px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
/* iOS zoome au focus si la police d'un champ < 16px : on force 16px en tactile */
@media (pointer: coarse){
  input, select, textarea, .field input, .field select, .field textarea,
  .set-row input, .set-row select, .month-pick { font-size:16px !important; }
}
body{
  font-family:"IBM Plex Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink); background:var(--paper);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-bottom:env(safe-area-inset-bottom);
  touch-action:manipulation;              /* coupe le double-tap zoom, garde le défilement */
  -webkit-text-size-adjust:100%;          /* pas de zoom auto du texte */
}
.mono{font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
#loadbar{position:sticky;top:0;z-index:29;height:3px;background:transparent;overflow:hidden}
#loadbar.on::before{content:"";position:absolute;inset:0;width:40%;
  background:linear-gradient(90deg,transparent,var(--brand),transparent);
  animation:load 1s linear infinite}
@keyframes load{from{transform:translateX(-120%)}to{transform:translateX(320%)}}
#outbox{max-width:1180px;margin:6px auto 0;padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;
  background:var(--req-bg);color:var(--req);border:1px solid #f0dcab;text-align:center}

/* ---------- En-tête ---------- */
header.app{
  position:sticky; top:0; z-index:30;
  background:linear-gradient(180deg,var(--header-1),var(--header-2)); color:var(--ink);
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  border-bottom:1px solid var(--line);
  box-shadow:0 6px 18px -14px rgba(38,48,63,.4);
}
.app-row{display:flex; align-items:center; gap:12px; max-width:1180px; margin:0 auto}
.brand{display:flex; align-items:center; gap:11px; font-weight:700; font-size:16px; letter-spacing:-.1px}
.brand .dot{width:11px;height:11px;border-radius:50%;background:var(--free);box-shadow:0 0 0 4px rgba(42,157,99,.22)}
.brand small{display:block;font-weight:500;font-size:11px;color:var(--ink-soft);letter-spacing:.2px;margin-top:1px}
.spacer{flex:1}
.role-switch{display:inline-flex;padding:3px;gap:3px;background:rgba(28,143,129,.10);
  border:1px solid rgba(28,143,129,.20);border-radius:999px}
.role-pill{
  display:inline-flex;align-items:center;gap:6px;background:transparent;border:none;
  color:var(--brand-ink);padding:7px 13px;border-radius:999px;
  font:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap
}
.role-pill:hover{background:rgba(28,143,129,.12)}
.role-pill.active{background:var(--brand);color:#fff;box-shadow:0 2px 8px -2px rgba(28,143,129,.5)}
.role-pill.active:hover{background:var(--brand)}

/* ---------- Barre outils ---------- */
.toolbar{
  max-width:1180px;margin:0 auto;padding:14px 16px 4px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap
}
.week-nav{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.month-pick{font:inherit;font-size:13px;font-weight:600;color:var(--ink);
  background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--radius-sm);
  padding:7px 10px;cursor:pointer;transition:border-color .15s, box-shadow .15s}
.month-pick:hover{border-color:var(--ink-soft)}
.month-pick:focus{outline:none;border-color:var(--brand);box-shadow:var(--focus)}
.month-pick::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.6}
.btn{
  font:inherit;font-weight:600;font-size:14px;cursor:pointer;
  border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);
  padding:9px 13px;border-radius:var(--radius-sm);line-height:1;
  transition:border-color .15s, background .15s, box-shadow .15s, transform .1s
}
.btn:hover{border-color:var(--ink-soft)}
.btn:active{transform:translateY(1px)}
.btn.icon{padding:9px 12px}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;box-shadow:0 4px 12px -4px rgba(28,143,129,.5)}
.btn.primary:hover{background:var(--brand-ink);border-color:var(--brand-ink)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft)}
.btn.ghost:hover{background:rgba(38,48,63,.05);border-color:transparent}
.btn.danger{color:var(--prio);border-color:var(--prio);background:transparent}
.btn.danger:hover{background:var(--prio-bg)}
.btn.small{padding:6px 10px;font-size:13px}
.week-label{font-weight:700;font-size:15px;min-width:150px;text-align:center}
.week-label span{display:block;font-size:11px;font-weight:500;color:var(--ink-soft)}

.site-select{position:relative}
.site-select select{
  font:inherit;font-weight:600;font-size:14px;padding:9px 34px 9px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--line-strong);background:var(--surface);appearance:none;cursor:pointer;color:var(--ink)
}
.site-select::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none}

/* ---------- Légende ---------- */
.legend{max-width:1180px;margin:6px auto 0;padding:0 16px;display:flex;gap:14px;flex-wrap:wrap;color:var(--ink-soft);font-size:12.5px}
.legend b{display:inline-flex;align-items:center;gap:6px;font-weight:500;color:var(--ink-soft)}
.chip{width:11px;height:11px;border-radius:3px;display:inline-block}
.chip.free{background:var(--free)} .chip.busy{background:var(--busy)}
.chip.req{background:var(--req)} .chip.prio{background:var(--prio)}
.chip.confirmed{background:#0f9d58}
.chip.rush{background:repeating-linear-gradient(45deg,#cdbf9f,#cdbf9f 3px,#b9a986 3px,#b9a986 6px)}

/* ---------- Grille semaine ---------- */
.week{
  max-width:1180px;margin:14px auto 40px;padding:0 12px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-items:start
}
.day{
  background:#fde8d0;border:1px solid #f0be86;border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow)
}
.day.today{border-color:#e8892f;background:#ffe7bd;box-shadow:0 0 0 2px rgba(232,137,47,.45), var(--shadow)}
.day-head{
  display:flex;align-items:center;gap:8px;padding:13px 15px;border-bottom:1px solid #f0be86;
  background:linear-gradient(#fbdcbb,#f7cfa0)
}
.day.today .day-head{background:linear-gradient(#ffe0a3,#ffcd76);border-bottom-color:#eaad55}
.day.today .badge{color:#9a6410;background:#fbe4b1}
.day-head .dname{font-weight:700;font-size:15px;text-transform:capitalize;letter-spacing:-.2px}
.day-head .ddate{font-size:12.5px;font-weight:700;color:var(--ink);opacity:.72}
.day-head .badge{margin-left:auto;font-size:11px;font-weight:700;color:var(--brand-ink);background:#ffffff;
  padding:3px 9px;border-radius:999px;letter-spacing:.2px}
.slots{padding:8px}
.day-site{margin:2px 15px 8px;padding:7px 11px;border-radius:9px;font-size:12px;font-weight:500;
  background:rgba(28,143,129,.10);color:var(--brand-ink);border:1px solid rgba(28,143,129,.22)}
.chip-move{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;
  background:var(--req-bg);color:var(--req);border:1px solid #f0dcab;border-radius:999px;padding:1px 8px;margin-left:6px}
.reco{color:var(--free);font-weight:600}
.site-tag{background:rgba(23,122,66,.12);color:#177a42;font-weight:800;letter-spacing:.2px}
.state.confirmed{color:#0f9d58 !important}
.info-auto{background:#eaf3ff;border:1px solid #cfe0f7;color:#2c4a6e;border-radius:10px;
  padding:8px 10px;font-size:12px;line-height:1.35;margin-bottom:12px}
.set-h{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.6px;
  margin:22px 0 4px;color:var(--brand-ink);border-top:1px solid var(--line);padding-top:16px;
  display:flex;align-items:center;gap:7px}
.set-h:first-of-type{border-top:none;padding-top:4px;margin-top:6px}
.set-note{font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;line-height:1.4}
.set-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.set-row input,.set-row select{flex:1;min-width:0;padding:10px 11px;border:1px solid var(--line-strong);
  border-radius:9px;background:#fffdf9;color:var(--ink);font:inherit;font-size:14px;transition:border-color .15s, box-shadow .15s}
.set-row input:focus,.set-row select:focus{outline:none;border-color:var(--brand);box-shadow:var(--focus)}
.set-row input[type=time]{flex:0 0 auto}
.set-row input[type=checkbox]{flex:0 0 auto;width:17px;height:17px;accent-color:var(--brand);margin-right:7px}
.set-lbl{flex:0 0 82px;font-size:13px;font-weight:500;color:var(--ink);display:flex;align-items:center}
.set-card{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;
  background:#fffdf9;box-shadow:var(--shadow-sm)}
.set-site-del,.set-rec-del{flex:0 0 auto}
.row.rush{background:repeating-linear-gradient(45deg,#efe9dd,#efe9dd 8px,#e7e0d0 8px,#e7e0d0 16px);border-color:var(--line-strong);color:var(--ink-soft)}
.row.rush .marker{width:4px;border-radius:3px;background:var(--ink-soft);flex:none}
.row.rush .title{color:var(--ink)}
.row.off{background:#eee9f3;border:1px solid #ddd3ea;color:#6a5c82}
.row.off .marker{width:4px;border-radius:3px;background:#8f7fb0;flex:none}
.row.off .title{color:#5b4d78}
.rush-toggle{margin:0 15px 8px;font-size:12.5px;color:var(--ink-soft)}
.rush-toggle label{display:inline-flex;align-items:center;gap:7px;cursor:pointer}
.rush-toggle input{width:16px;height:16px;accent-color:var(--brand)}
.rush-toggle.off{color:var(--req)}
.row.urgonly{cursor:pointer;background:#fdeef0;border:1px dashed #e0908f;color:#a11;transition:.15s}
.row.urgonly:hover{background:#fbe0e3;border-color:var(--prio);transform:translateY(-1px)}
.row.urgonly .marker{width:4px;border-radius:3px;background:var(--prio);flex:none}
.row.urgonly .title{color:#a11;display:flex;align-items:center;gap:7px}
.row.urgonly .meta{color:#a45}
.info-i{width:18px;height:18px;flex:none;border-radius:50%;border:1px solid currentColor;background:transparent;
  color:inherit;font:inherit;font-size:11px;font-weight:700;line-height:1;cursor:pointer;padding:0}
.info-i:hover{background:rgba(0,0,0,.06)}
.dir-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.dir-chip{display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:13px;font-weight:700;
  padding:8px 12px;border-radius:999px;cursor:pointer;color:var(--ink);
  background:var(--surface);border:1px solid var(--line-strong);transition:.15s}
.dir-chip:hover{border-color:var(--brand)}
.dir-chip.on{background:var(--brand);border-color:var(--brand);color:#fff}
.dir-chip .dir-site{font-weight:500;font-size:11px;opacity:.7}
.dir-chip .dir-n{min-width:19px;height:19px;padding:0 5px;border-radius:999px;font-size:11px;
  display:inline-flex;align-items:center;justify-content:center;background:rgba(38,48,63,.10)}
.dir-chip.on .dir-n{background:rgba(255,255,255,.28)}
.move-grp{display:inline-flex;gap:2px;margin:0 2px}
.chip-urgent{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;
  background:#fde3e3;color:#c8102e;border:1px solid #f3c3c3;border-radius:999px;padding:1px 8px;margin-left:6px}
.inbox-card.urgent{border-color:#e0a; box-shadow:0 0 0 2px rgba(200,16,46,.18), var(--shadow-sm)}
.urg-box{display:flex;align-items:center;gap:9px;margin:2px 0 12px;padding:9px 11px;border-radius:10px;
  background:#fdeef0;border:1px solid #f3c9cf;font-size:13px;font-weight:600;color:#a11}
.urg-box input{width:18px;height:18px;accent-color:#c8102e}
.weekload{max-width:1180px;margin:8px auto 0;padding:8px 14px}
.wl-txt{font-size:13px;color:var(--ink)}
.wl-bar{height:8px;border-radius:6px;background:rgba(38,48,63,.08);overflow:hidden;margin-top:5px}
.wl-bar span{display:block;height:100%;border-radius:6px;transition:width .3s}
/* Tournée */
.tour-site{border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;background:#fffdf9;box-shadow:var(--shadow-sm)}
.tour-site-h{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tour-site-h .btn{margin-left:auto}
.tour-item{font-size:14px;padding:6px 0;border-top:1px dashed var(--line)}
.tour-item:first-of-type{border-top:none}
.tour-item .mono{color:var(--ink-soft);margin-right:6px}
/* Heatmap */
.hm-grid-h,.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.hm-grid-h{margin:8px 0 4px;font-size:11px;font-weight:700;color:var(--ink-soft);text-align:center}
.hm-cell{position:relative;aspect-ratio:1;border:1px solid var(--line);border-radius:9px;
  background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0}
.hm-cell.empty{border:none;cursor:default}
.hm-cell.weekend{opacity:.4;cursor:default}
.hm-cell .hm-n{font-size:12px;font-weight:600;color:var(--ink)}
.hm-cell .hm-c{font-size:10px;font-weight:700;color:var(--brand-ink)}
.row{
  display:flex;gap:10px;align-items:stretch;padding:10px 9px;border-radius:var(--radius-sm);
  border:1px solid transparent;transition:background .15s, border-color .15s, transform .12s
}
.row .time{width:96px;flex:none;color:var(--ink-soft);font-size:12.5px;padding-top:1px}
.row .body{flex:1;min-width:0}
.row .title{font-weight:600;font-size:14px;line-height:1.25}
.row .meta{font-size:12px;color:var(--ink-soft);margin-top:3px}
.tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;margin-right:6px}

/* états */
.row.free{cursor:pointer;background:var(--free-bg);border:1px dashed #a6d7bc}
.row.free:hover{background:#d8f0e0;border-color:var(--free);transform:translateY(-1px)}
.row.free:active{transform:translateY(0)}
.row.free .title{color:var(--free)}
.row.busy{background:var(--busy-bg);border-color:#f3c3c3}
.row.busy .marker{width:4px;border-radius:3px;background:var(--busy);flex:none}
.row.req{background:var(--req-bg);border-color:#f0dcab}
.row.req .marker{background:var(--req)}
.row.prio{background:var(--prio-bg);border-color:#f4c9bd}
.row.prio .marker{background:var(--prio)}
.row.confirmed{background:var(--confirmed-bg);border-color:#c9d9f2}
.row.confirmed .marker{background:var(--confirmed)}
.state{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.state.req{color:var(--req)} .state.prio{color:var(--prio)} .state.confirmed{color:var(--confirmed)}
.admin-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.empty-day{padding:18px 14px;color:var(--ink-soft);font-size:13px;text-align:center}

/* ---------- Bandeau demandes (admin) ---------- */
.inbox{max-width:1180px;margin:0 auto;padding:0 16px}
.inbox-card{
  background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--req);
  border-radius:var(--radius);padding:12px 14px;margin-top:12px;box-shadow:var(--shadow)
}
.inbox-card.prio{border-left-color:var(--prio)}
.inbox-card h4{margin:0 0 4px;font-size:14px}
.inbox-card .meta{font-size:12.5px;color:var(--ink-soft)}
.inbox-actions{display:flex;gap:8px;margin-top:10px}

/* ---------- Modale ---------- */
.overlay{position:fixed;inset:0;background:rgba(18,22,31,.55);backdrop-filter:blur(2px);
  display:none;align-items:flex-end;justify-content:center;z-index:60}
.overlay.open{display:flex}
@media(min-width:640px){.overlay{align-items:center}}
.sheet{
  background:var(--surface);width:100%;max-width:480px;border-radius:18px 18px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);
  max-height:92vh;overflow:auto;animation:rise .22s ease
}
@media(min-width:640px){.sheet{border-radius:18px;animation:pop .18s ease}}
@keyframes rise{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
@keyframes pop{from{transform:scale(.97);opacity:.6}to{transform:none;opacity:1}}
.sheet h3{margin:0 0 2px;font-size:18px}
.sheet .sub{color:var(--ink-soft);font-size:13px;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;font:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line-strong);
  border-radius:10px;background:#fffdf9;color:var(--ink);transition:border-color .15s, box-shadow .15s
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:var(--focus)}
.field textarea{resize:vertical;min-height:58px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.prio-box{
  display:flex;gap:11px;align-items:flex-start;padding:12px;border:1px dashed var(--prio);
  background:var(--prio-bg);border-radius:12px;margin:4px 0 14px;cursor:pointer
}
.prio-box input{margin-top:2px;width:18px;height:18px;accent-color:var(--prio)}
.prio-box .t{font-weight:700;color:var(--prio);font-size:14px}
.prio-box .d{font-size:12.5px;color:#8a3b2c;margin-top:2px}
.sheet-actions{display:flex;gap:10px;margin-top:6px}
.sheet-actions .btn{flex:1;justify-content:center;text-align:center;padding:12px}
.conflict{background:var(--prio-bg);border:1px solid #f4c9bd;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.conflict b{color:var(--prio)}
.pick-list{display:flex;flex-direction:column;gap:8px;max-height:230px;overflow:auto;margin-top:6px}
.pick{border:1px solid var(--line-strong);border-radius:10px;padding:10px 12px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;gap:8px}
.pick:hover{border-color:var(--brand);background:var(--free-bg)}
.pick.sel{border-color:var(--brand);background:var(--free-bg);box-shadow:inset 0 0 0 1px var(--brand)}

/* ---------- Toast ---------- */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:500;

/* ======================= FIN DE LA ZONE À ÉDITER =========================== */

const DAYS_FR = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const MONTHS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const SLOT = CONFIG.HOURS.slotMin;
// Clés Supabase / ntfy : fichier OU localStorage (persistent entre déploiements)

<script>
/* --- Anti-zoom mobile : bloque le pincer-zoomer (iOS ignore user-scalable=no).
   Le double-tap est déjà neutralisé par touch-action:manipulation ; on ne touche
   pas à touchend pour ne pas casser les clics sur les créneaux/boutons.        */
["gesturestart","gesturechange","gestureend"].forEach(ev=>
  document.addEventListener(ev, e=>e.preventDefault(), {passive:false}));

/* ------------------------------------------------------------------ Helpers */
const $=(s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const pad=n=>String(n).padStart(2,"0");
const toMin=t=>{const[a,b]=t.split(":").map(Number);return a*60+b;};
const toHM=m=>pad(Math.floor(m/60))+":"+pad(m%60);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function toast(msg,err){const t=$("#toast");t.textContent=msg;t.className="show"+(err?" err":"");clearTimeout(t._t);t._t=setTimeout(()=>t.className="",3200);}

function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-day);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function iso(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function fmtDay(d){return d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}
function weekNum(d){const x=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=(x.getUTCDay()+6)%7;x.setUTCDate(x.getUTCDate()-dn+3);const f=new Date(Date.UTC(x.getUTCFullYear(),0,4));return 1+Math.round(((x-f)/864e5-3+((f.getUTCDay()+6)%7))/7);}

/* --------------------------------------------------------------- État global */
const State={
  role:"directeur",           // "directeur" | "admin"
  site:"__all__",
  weekStart:mondayOf(new Date()),
  rows:[],                    // interventions de la semaine affichée
};

/* --------------------------------------------- Paramètres modifiables (UI)
   Partagés via Supabase (table app_settings) ; repli localStorage en démo.     */
let SB=null;
const SETTINGS = {
  sites: CONFIG.SITES.slice(),
  directors: {...(CONFIG.DIRECTORS||{})},
  recurring: CONFIG.RECURRING.map(x=>({...x})),
  baseSite: {...CONFIG.BASE_SITE},
  rush: {...CONFIG.RUSH},
  weeklyHours: CONFIG.WEEKLY_HOURS,
  rushOff: [],           // jours (YYYY-MM-DD) où le rush est retiré (gros chantier)
  pinHash: ""            // vide => on utilise l'empreinte du fichier (CONFIG.ADMIN_PIN_HASH)
};
async function sha256Hex(s){
  const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(s)));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function applySettings(d){
  if(!d||typeof d!=="object") return;
  if(Array.isArray(d.sites)&&d.sites.length) SETTINGS.sites=d.sites.slice();
  if(d.directors&&typeof d.directors==="object") SETTINGS.directors={...d.directors};
  if(Array.isArray(d.recurring)) SETTINGS.recurring=d.recurring.map(x=>({...x}));
  if(d.baseSite&&typeof d.baseSite==="object") SETTINGS.baseSite={...d.baseSite};
  if(d.rush&&typeof d.rush==="object") SETTINGS.rush={...CONFIG.RUSH,...d.rush};
  if(typeof d.weeklyHours==="number"&&d.weeklyHours>0) SETTINGS.weeklyHours=d.weeklyHours;
  if(Array.isArray(d.rushOff)) SETTINGS.rushOff=d.rushOff.slice();
  if(typeof d.pinHash==="string") SETTINGS.pinHash=d.pinHash;
}
async function loadSettings(){
  try{
    if(SB){
      const {data,error}=await SB.from("app_settings").select("data").eq("id",1).maybeSingle();
      if(!error && data) applySettings(data.data);
    } else {
      const raw=localStorage.getItem("planning_settings");
      if(raw) applySettings(JSON.parse(raw));
    }
  }catch(e){ console.warn("loadSettings",e); }
}
async function saveSettings(){
  const payload={sites:SETTINGS.sites,directors:SETTINGS.directors,recurring:SETTINGS.recurring,baseSite:SETTINGS.baseSite,rush:SETTINGS.rush,weeklyHours:SETTINGS.weeklyHours,rushOff:SETTINGS.rushOff,pinHash:SETTINGS.pinHash};
  if(SB){
    const {error}=await SB.from("app_settings").upsert({id:1,data:payload,updated_at:new Date().toISOString()});
    if(error) throw error;
  } else {
    localStorage.setItem("planning_settings",JSON.stringify(payload));
  }
}
function subscribeSettings(){
  if(!SB) return;
  try{
    SB.channel("settings").on("postgres_changes",{event:"*",schema:"public",table:"app_settings"},
      async()=>{ await loadSettings(); bindSiteFilter(); render(); }).subscribe();
  }catch(e){ console.warn("subscribeSettings",e); }
}

/* ============================================================ COUCHE DONNÉES
   Deux implémentations : Supabase (partagé) ou localStorage (démo).           */
let Store;
function makeStore(){
  if(supaOn && !window.__supaFail && window.supabase){
    SB=window.supabase.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
    let chan=null;
    return {
      mode:"supabase",
      async list(ws){
        const from=iso(ws), to=iso(addDays(ws,6));
        const {data,error}=await SB.from("interventions").select("*").gte("date",from).lte("date",to);
        if(error)throw error; return data||[];
      },
      async range(fromISO,toISO){
        const {data,error}=await SB.from("interventions").select("*").gte("date",fromISO).lte("date",toISO);
        if(error)throw error; return data||[];
      },
      async insert(r){const{data,error}=await SB.from("interventions").insert(r).select().single();if(error)throw error;return data;},
      async update(id,p){const{error}=await SB.from("interventions").update(p).eq("id",id);if(error)throw error;},
      async remove(id){const{error}=await SB.from("interventions").delete().eq("id",id);if(error)throw error;},
      async renameSite(oldN,newN){const{error}=await SB.from("interventions").update({site:newN}).eq("site",oldN);if(error)throw error;},
      subscribe(cb){
        if(chan)SB.removeChannel(chan);
        chan=SB.channel("iv").on("postgres_changes",{event:"*",schema:"public",table:"interventions"},cb).subscribe();
      }
    };
  }
  /* -------- mode démo local -------- */
  return {
    mode:"demo",
    _read(){try{return JSON.parse(localStorage.getItem("planning_iv")||"[]")}catch{return[]}},
    _write(a){localStorage.setItem("planning_iv",JSON.stringify(a));},
    async list(ws){const from=iso(ws),to=iso(addDays(ws,6));return this._read().filter(r=>r.date>=from&&r.date<=to);},
    async range(fromISO,toISO){return this._read().filter(r=>r.date>=fromISO&&r.date<=toISO);},
    async insert(r){const a=this._read();r.id="loc_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);a.push(r);this._write(a);return r;},
    async update(id,p){const a=this._read();const i=a.findIndex(x=>x.id===id);if(i>=0){Object.assign(a[i],p);this._write(a);}},
    async remove(id){this._write(this._read().filter(x=>x.id!==id));},
    async renameSite(oldN,newN){const a=this._read();a.forEach(r=>{if(r.site===oldN)r.site=newN;});this._write(a);},
    subscribe(){/* pas de temps réel en démo : on re-render après chaque action */}
  };
}

/* Génère les interventions récurrentes manquantes pour la semaine affichée */
async function materialize(ws,existing){
  const created=[];
  for(const t of SETTINGS.recurring){
    // Fréquence : toutes les 2 semaines → ne matérialise que selon la parité du n° de semaine ISO
    if(Number(t.freq)===2){
      const even = weekNum(ws)%2===0;
      const runThisWeek = (t.parity==="odd") ? !even : even;   // défaut = semaines paires
      if(!runThisWeek) continue;
    }
    const date=iso(addDays(ws,t.weekday-1));
    const dup=existing.some(r=>r.source==="template"&&r.date===date&&r.start===t.start&&r.site===t.site&&r.title===t.title);
    if(!dup){
      const row={date,site:t.site,title:t.title,start:t.start,end:t.end,
        status:"planned",priority:false,source:"template",requested_by:"Récurrent",notes:""};
      try{const saved=await Store.insert(row);created.push(saved);}catch(e){console.warn(e);}
    }
  }
  return created;
}

/* ------------------------------------------------------------- Notifications */
async function notify(title,body,opts){
  opts=opts||{};
  const tasks=[]; const appUrl=location.origin+location.pathname;
  const topic=opts.topic||CONFIG.NTFY_TOPIC;
  if(topic){
    tasks.push(fetch("https://ntfy.sh/"+topic,{method:"POST",
      headers:{"Title":encodeURIComponent(title),"Tags":opts.tags||"wrench","Priority":opts.priority||"high","Click":appUrl},
      body}).catch(()=>{}));
  }
  if(CONFIG.N8N_WEBHOOK){
    tasks.push(fetch(CONFIG.N8N_WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({title,body,url:appUrl,at:new Date().toISOString()})}).catch(()=>{}));
  }
  await Promise.allSettled(tasks);
}
function slug(s){ return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,""); }
/* Directeurs : liste de secours (utilisée si un site n'a pas de directeur défini) */
const DIRECTOR_FALLBACK = ["Vlad","Kylian","Amandine","Kevin","Jeremy"];
function dirsOfSite(site){ return String((SETTINGS.directors||{})[site]||"").split(",").map(x=>x.trim()).filter(Boolean); }
function allDirs(){
  const a=[];
  SETTINGS.sites.forEach(s=>dirsOfSite(s).forEach(n=>{ if(!a.includes(n)) a.push(n); }));
  DIRECTOR_FALLBACK.forEach(n=>{ if(!a.includes(n)) a.push(n); });   // garantit tous les noms
  return a;
}
function siteOfDir(name){ return SETTINGS.sites.find(s=>dirsOfSite(s).some(n=>n.toLowerCase()===String(name).toLowerCase())); }
function dirRole(name){
  const s=siteOfDir(name); if(!s) return "";
  const i=dirsOfSite(s).findIndex(n=>n.toLowerCase()===String(name).toLowerCase());
  return i===0?"principal":i>0?"adjoint":"";
}
async function notifySite(site,title,body,opts){
  if(!CONFIG.NTFY_TOPIC) return;
  await notify(title,body,Object.assign({topic:CONFIG.NTFY_TOPIC+"-"+slug(site)},opts||{}));
}

/* =============================================================== CHARGEMENT */
async function load(){
  const bar=$("#loadbar"); if(bar) bar.classList.add("on");
  try{
    let rows=await Store.list(State.weekStart);
    const created=await materialize(State.weekStart,rows);
    if(created.length) rows=rows.concat(created);
    State.rows=rows;
    render();
  }catch(e){
    console.error(e);
    toast("Connexion aux données impossible — réessaie",true);
  }finally{
    if(bar) bar.classList.remove("on");
  }
}

/* ================================================================= RENDU UI */
function isOverflow(r){ return r.start==="00:00" && r.end==="00:01"; }
function visibleRows(){
  return State.rows.filter(r=>r.status!=="cancelled" && r.status!=="refused" && !isOverflow(r) &&
    (State.site==="__all__"||r.site===State.site));
}

function dayTimeline(dateStr){
  const open=CONFIG.HOURS.start*60, close=CONFIG.HOURS.end*60;
  const jobs=visibleRows().filter(r=>r.date===dateStr);
  const rr=rushRow(dateStr); if(rr) jobs.push(rr);
  jobs.sort((a,b)=>toMin(a.start)-toMin(b.start));
  const items=[]; let cur=open;
  for(const j of jobs){
    const s=Math.max(toMin(j.start),open), e=Math.min(toMin(j.end),close);
    if(s>cur) items.push({free:true,start:cur,end:s});
    items.push({free:false,job:j,start:s,end:e});
    cur=Math.max(cur,e);
  }
  if(cur<close) items.push({free:true,start:cur,end:close});
  return items;
}

/* --- Regroupement par site du jour --------------------------------------- */
const NOON = 12*60;
function baseSiteFor(dateStr){ return (SETTINGS.baseSite&&SETTINGS.baseSite[new Date(dateStr).getDay()])||null; }
function rushInterval(){ const r=SETTINGS.rush; return (r&&r.enabled)?{start:r.start,end:r.end,label:r.label||"Rush cuisine"}:null; }
function rushOffHas(ds){ return Array.isArray(SETTINGS.rushOff) && SETTINGS.rushOff.includes(ds); }
async function toggleRushDay(ds){
  if(!Array.isArray(SETTINGS.rushOff)) SETTINGS.rushOff=[];
  const i=SETTINGS.rushOff.indexOf(ds);
  if(i>=0) SETTINGS.rushOff.splice(i,1); else SETTINGS.rushOff.push(ds);
  try{ await saveSettings(); toast(i>=0?"Rush rétabli ce jour":"Rush retiré ce jour"); await load(); }
  catch(e){ console.warn(e); toast("Enregistrement impossible",true); }
}
function rushRow(dateStr){ const r=rushInterval(); return (r && !rushOffHas(dateStr))?{date:dateStr,site:"—",title:r.label,start:r.start,end:r.end,status:"planned",source:"rush",priority:false}:null; }
function isWorkday(d){ const w=d.getDay(); return w>=1 && w<=CONFIG.HOURS.days; }
function nextWorkday(dateStr){ let x=new Date(dateStr); do{ x=addDays(x,1); }while(!isWorkday(x)); return iso(x); }

// Occupation réelle d'un jour = TOUS sites confondus (Thibaut est seul)
function busyRowsOn(dateStr){
  const rows=State.rows.filter(r=>r.status!=="cancelled" && r.date===dateStr && r.source!=="free");
  const rr=rushRow(dateStr); if(rr) rows.push(rr);
  return rows.sort((a,b)=>toMin(a.start)-toMin(b.start));
}
function freeGapsAll(dateStr){
  const open=CONFIG.HOURS.start*60, close=CONFIG.HOURS.end*60;
  const gaps=[]; let cur=open;
  for(const j of busyRowsOn(dateStr)){
    const s=Math.max(toMin(j.start),open), e=Math.min(toMin(j.end),close);
    if(s>cur) gaps.push({start:cur,end:s});
    cur=Math.max(cur,e);
  }
  if(cur<close) gaps.push({start:cur,end:close});
  return gaps;
}
// 1er créneau libre de durée `dur` dans la fenêtre [wStart,wEnd), sinon null
function findSlot(dateStr,dur,wStart,wEnd){
  for(const g of freeGapsAll(dateStr)){
    const s=Math.max(g.start,wStart), e=Math.min(g.end,wEnd);
    if(e-s>=dur) return s;
  }
  return null;
}
// Placement auto : site du jour → matin ; autre site → après-midi ; journée pleine → jour suivant
function autoPlace(dateStr,site,dur){
  const open=CONFIG.HOURS.start*60, close=CONFIG.HOURS.end*60;
  const r=rushInterval();
  const mEnd = r?toMin(r.start):NOON;   // fin du matin = début du rush (11:45)
  const aStart = r?toMin(r.end):NOON;   // début aprem = fin du rush (13:20)
  let d=dateStr;
  for(let k=0;k<7;k++){
    const base = baseSiteFor(d)===site;
    const win1 = base?[open,mEnd]:[aStart,close];   // fenêtre préférée
    const win2 = base?[aStart,close]:[open,mEnd];   // repli même jour
    let s=findSlot(d,dur,win1[0],win1[1]), pref=true;
    if(s===null){ s=findSlot(d,dur,win2[0],win2[1]); pref=false; }
    if(s!==null) return {date:d,start:toHM(s),base,pref,sameDay:d===dateStr};
    d=nextWorkday(d);
  }
  return null;
}

/* --- Charge hebdomadaire (idée 16) — référence : durée contractuelle --- */
function updateWeekLoad(ws){
  const el2=$("#weekLoad"); if(!el2) return;
  const r=rushInterval(); const rushMin=r?(toMin(r.end)-toMin(r.start)):0;
  const weekMin=(SETTINGS.weeklyHours||42)*60;
  const perDay=weekMin/CONFIG.HOURS.days;
  let avail=weekMin, planned=0, rushTot=0;
  for(let i=0;i<CONFIG.HOURS.days;i++){
    const ds=iso(addDays(ws,i));
    const off=State.rows.some(x=>x.date===ds&&x.source==="off"&&x.status!=="cancelled");
    if(off){ avail-=perDay; continue; }
    if(r && !rushOffHas(ds)) rushTot+=rushMin;
    State.rows.filter(x=>x.date===ds && x.source!=="off" && x.source!=="rush"
        && x.status!=="cancelled" && x.status!=="refused")
      .forEach(x=>{ planned += Math.max(0,toMin(x.end)-toMin(x.start)); });
  }
  if(avail<0) avail=0;
  const load=planned+rushTot;
  const h=m=>(m/60).toFixed(1).replace(",",".").replace(/\.0$/,"").replace(".",",");
  const pct=avail?Math.round(load/avail*100):0;
  const col=pct>=100?"var(--busy)":pct>=80?"var(--req)":"var(--free)";
  el2.style.display="";
  el2.innerHTML=`<div class="wl-txt">Charge de la semaine : <b style="color:${col}">${pct}%</b> —
      ${h(planned)} h interventions${rushTot?` + ${h(rushTot)} h rush`:""} / ${h(avail)} h</div>
    <div class="wl-bar"><span style="width:${Math.min(100,pct)}%;background:${col}"></span></div>`;
}

/* --- Sécurité côté client --- */
function rateOk(max=6,winMs=60000){
  try{ const now=Date.now();
    let a=JSON.parse(localStorage.getItem("planning_rl")||"[]").filter(t=>now-t<winMs);
    if(a.length>=max) return false;
    a.push(now); localStorage.setItem("planning_rl",JSON.stringify(a)); return true;
  }catch(e){ return true; }
}
function writeErrMsg(e){
  const m=((e&&(e.message||e.error_description||e.msg))||"")+"";
  if(/row-level security|permission|denied|not authoriz|JWT|401|403|policy/i.test(m))
    return "Action refusée (mode sécurisé) — connecte-toi par e-mail dans ⚙ Paramètres pour gérer les interventions.";
  return "Action impossible pour le moment — réessaie.";
}
function isNetErr(e){
  const m=((e&&(e.message||e.msg))||"")+"";
  return !navigator.onLine || /fetch|network|timeout|Failed to fetch|NetworkError/i.test(m);
}

/* --- File d'attente hors-ligne (idée 8) --- */
function outboxGet(){ try{ return JSON.parse(localStorage.getItem("planning_outbox")||"[]"); }catch(e){ return []; } }
function outboxSet(a){ try{ localStorage.setItem("planning_outbox",JSON.stringify(a)); }catch(e){} outboxBadge(); }
function outboxQueue(row){ const a=outboxGet(); a.push(row); outboxSet(a); }
function outboxBadge(){
  const b=$("#outbox"); if(!b) return;
  const n=outboxGet().length;
  b.style.display=n?"":"none"; b.textContent=`⏳ ${n} demande(s) en attente d'envoi`;
}
async function flushOutbox(){
  if(!navigator.onLine) return;
  let a=outboxGet(); if(!a.length) return;
  const keep=[];
  for(const row of a){ try{ await Store.insert(row); }catch(e){ keep.push(row); } }
  outboxSet(keep);
  if(keep.length<a.length){ toast("Demandes hors-ligne synchronisées ✔"); await load(); }
}

async function adminAct(act,id){
  const j=State.rows.find(r=>r.id===id); if(!j)return;
  if(act==="edit"){openEdit(j);return;}
  try{
    if(act==="ok"){
      await Store.update(id,{status:"confirmed"}); toast("Intervention confirmée");
      await notifySite(j.site,"✅ Demande confirmée — "+j.site,
        `${j.title}\n${DAYS_FR[new Date(j.date).getDay()]} ${fmtDay(new Date(j.date))} ${j.start}–${j.end}`,{tags:"white_check_mark"});
      await load();
    }
    if(act==="refuse"){
      const why=prompt("Motif du refus (visible par le directeur) :","");
      if(why===null) return;
      const notes=(j.notes?j.notes+" · ":"")+"REFUSÉ : "+(why||"non précisé");
      await Store.update(id,{status:"refused",notes});
      toast("Demande refusée");
      await notifySite(j.site,"❌ Demande refusée — "+j.site,
        `${j.title}\n${DAYS_FR[new Date(j.date).getDay()]} ${fmtDay(new Date(j.date))}\nMotif : ${why||"non précisé"}`,{tags:"x"});
      await load();
    }
    if(act==="del"){ if(confirm("Supprimer définitivement cette intervention ?")){ await Store.remove(id); toast("Supprimé"); await load(); } }
  }catch(e){ console.warn(e); toast(writeErrMsg(e),true); }
}

// Déplacement rapide (idée 14) : décale de dMin minutes et/ou dDays jours
async function moveJob(id,dMin,dDays){
  const j=State.rows.find(r=>r.id===id); if(!j)return;
  const open=CONFIG.HOURS.start*60, close=CONFIG.HOURS.end*60;
  let s=toMin(j.start)+ (dMin||0), e=toMin(j.end)+ (dMin||0);
  if(s<open||e>close){ toast("Hors des horaires de travail",true); return; }
  let date=j.date;
  if(dDays){ let x=new Date(j.date); do{ x=addDays(x,dDays>0?1:-1); }while(!isWorkday(x)); date=iso(x); }
  try{
    await Store.update(id,{date,start:toHM(s),end:toHM(e)});
    await load();
  }catch(e){ console.warn(e); toast(/exclusion|overlap|23P01/i.test((e&&e.message)||"")?"Créneau déjà occupé à cet horaire":writeErrMsg(e),true); }
}

async function uploadPhoto(file){
  if(!SB||!file) return "";
  try{
    const ext=((file.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,""))||"jpg";
    const path=`req/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const {error}=await SB.storage.from("photos").upload(path,file,{contentType:file.type||"image/jpeg"});
    if(error) throw error;
    const {data}=SB.storage.from("photos").getPublicUrl(path);
    return (data&&data.publicUrl)||"";
  }catch(e){ console.warn("photo upload",e); return ""; }
}

    `<option value="${m}">${fmtDur(m)}</option>`).join("");
  const typeOpts=FAULT_PRESETS.map((t,i)=>`<option value="${i}">${esc(t.label)}</option>`).join("");
  const siteDefault = State.site!=="__all__"?State.site:SETTINGS.sites[0];
  const dirList=allDirs();
  const dirDefault=dirsOfSite(siteDefault)[0]||"";
  const dirOpts=[`<option value="">— Choisir votre nom</option>`]
    .concat(dirList.map(n=>{
      const rl=dirRole(n);
      return `<option value="${esc(n)}" ${n===dirDefault?"selected":""}>${esc(n)}${rl==="adjoint"?" (adjoint)":""}</option>`;
    })).join("");
  sheet.innerHTML=`
    <h3>${urgentOnly?"🚨 Demande urgente":"Proposer une intervention"}</h3>
    <div class="sub">${DAYS_FR[dt.getDay()]} ${fmtDay(dt)}${urgentOnly?" · journée pleine ou bloquée":` · créneau libre ${startDefault}–${rangeEnd}`}</div>
    ${urgentOnly
      ? `<div class="info-auto" style="background:#fdeef0;border-color:#f3c9cf;color:#a11">🚨 Cette journée est <b>pleine ou bloquée</b> (chantier / congé). Seule une <b>vraie urgence</b> est acceptée ici : elle sera signalée hors planning et Thibaut recevra une alerte immédiate pour arbitrer.</div>`
      : `<div class="info-auto">ℹ️ Une intervention n'est placée le matin que si c'est le site du jour. Sinon elle va l'après-midi ; et si la journée est pleine, elle passe au lendemain.</div>`}
    <div class="field"><label>Site concerné</label>
      <select id="f-site">${SETTINGS.sites.map(s=>`<option ${s===siteDefault?"selected":""}>${esc(s)}</option>`).join("")}</select></div>
    <div class="field"><label>Type d'intervention</label><select id="f-type">${typeOpts}</select></div>
    <div class="field" id="f-detail-wrap" style="display:none"><label id="f-detail-lbl">Précisez</label><input id="f-detail" placeholder=""></div>
    <div class="field"><label>Objet de l'intervention</label>
      <input id="f-title" placeholder="Ex : néon HS couloir, fuite sous évier…"></div>
    <div class="field"><label>Durée estimée</label><select id="f-dur">${durOpts}</select></div>
    ${urgentOnly
      ? `<label class="urg-box"><input type="checkbox" id="f-urgent" checked disabled> <span>🚨 Urgent — alerte immédiate (obligatoire ici)</span></label>`
      : `<label class="urg-box"><input type="checkbox" id="f-urgent"> <span>🚨 Urgent — alerte immédiate</span></label>`}
    <div class="field"><label>Photo de la panne (facultatif)</label><input id="f-photo" type="file" accept="image/*"></div>
    <div class="field"><label>Précisions${urgentOnly?" — pourquoi est-ce urgent ?":" (facultatif)"}</label>
      <textarea id="f-notes" placeholder="${urgentOnly?"Panne bloquante, sécurité, fuite…":"Détails utiles, matériel concerné…"}"></textarea></div>
    <div class="field"><label>Votre nom</label>
      <select id="f-by">${dirOpts}</select></div>

    <div class="sheet-actions">
      <button class="btn" id="f-cancel">Annuler</button>
      <button class="btn primary" id="f-send">${urgentOnly?"Envoyer l'urgence":"Envoyer la demande"}</button>
    </div>`;
  overlay.classList.add("open");
  $("#f-cancel").onclick=closeSheet;
  $("#f-site").onchange=e=>{
    const n=dirsOfSite(e.target.value)[0];
    const sel=$("#f-by");
    if(n && [...sel.options].some(o=>o.value===n)) sel.value=n;
  };
  $("#f-type").onchange=e=>{
    const t=FAULT_PRESETS[+e.target.value]||{};
    if(t.dur) $("#f-dur").value=String(t.dur);
    const wrap=$("#f-detail-wrap");
    if(t.detail){
      wrap.style.display="";
      $("#f-detail-lbl").textContent=t.detail;
      $("#f-detail").placeholder=t.detail;
      $("#f-detail").value="";
      $("#f-detail").focus?.();
    } else {
      wrap.style.display="none";
      if(+e.target.value>0 && t.label) $("#f-title").value=t.label;
    }
  };
  $("#f-send").onclick=async()=>{
    const ti=+$("#f-type").value, tp=FAULT_PRESETS[ti]||{};
    let title=$("#f-title").value.trim();
    if(tp.detail){ const det=($("#f-detail").value||"").trim(); if(det) title=(tp.prefix||"")+det; }
    if(!title){toast("Indique l'objet de l'intervention",true);return;}
    if(State.role!=="admin" && !rateOk()){toast("Trop de demandes en peu de temps — patiente une minute",true);return;}
    const dur=parseInt($("#f-dur").value,10);
    const site=$("#f-site").value, notes=$("#f-notes").value.trim(), by=$("#f-by").value.trim();
    if(!by){toast("Choisis ton nom dans la liste",true);return;}
    const urgent=urgentOnly?true:$("#f-urgent").checked;

    const file=$("#f-photo").files&&$("#f-photo").files[0];

    // Journée pleine/bloquée : l'urgence est déposée HORS créneau (à arbitrer par Thibaut)
    if(urgentOnly){
      if(!notes){ toast("Explique pourquoi c'est urgent",true); return; }
      if(!confirm("Cette journée est pleine ou bloquée.\n\nL'urgence sera signalée hors planning et Thibaut décidera quoi décaler.\n\nConfirmer l'envoi ?")) return;
      let photo_url="";
      if(file){ toast("Envoi de la photo…"); photo_url=await uploadPhoto(file); }
      await submitRequest({date:dateStr,site,title,start:"00:00",end:"00:01",notes,by,urgent:true,photo_url,
        status:"requested",overflow:true,_urgentOnly:true});
      return;
    }

    const p=autoPlace(dateStr,site,dur);
    if(!p){ toast("Aucun créneau libre dans les prochains jours",true); return; }
    const end=toHM(toMin(p.start)+dur);
    if(!p.sameDay){
      const dObj=new Date(p.date);
      if(!confirm(`Journée pleine. Proposer plutôt ${DAYS_FR[dObj.getDay()]} ${fmtDay(dObj)} à ${p.start} ?`)) return;
    }
    let photo_url="";
    if(file){ toast("Envoi de la photo…"); photo_url=await uploadPhoto(file); }
    await submitRequest({date:p.date,site,title,start:p.start,end,notes,by,urgent,photo_url,status:"requested",
      _base:p.base,_sameDay:p.sameDay,_pref:p.pref});
  };
}

async function submitRequest(d){
  const row={date:d.date,site:d.site,title:d.title,start:d.start,end:d.end,
    status:State.role==="admin"?"confirmed":"requested",priority:false,
    source:"adhoc",requested_by:d.by,notes:d.notes};
  if(d.urgent) row.urgent=true;
  if(d.photo_url) row.photo_url=d.photo_url;
  try{ await Store.insert(row); }
  catch(e){
    console.warn(e);
    if(isNetErr(e) && row.status==="requested"){
      outboxQueue(row); closeSheet();
      toast("Hors-ligne : demande enregistrée, envoyée dès le retour du réseau ⏳");
      return;
    }
    toast(writeErrMsg(e),true); return;
  }
  closeSheet();
  const head=(d.urgent?"🚨 URGENT — ":"🟠 Nouvelle demande — ")+d.site;
  await notify(head,
    `${d.title}\n${DAYS_FR[new Date(d.date).getDay()]} ${fmtDay(new Date(d.date))} ${d.start}–${d.end}\nPar ${d.by}${d.notes?"\n"+d.notes:""}${d.photo_url?"\n📷 photo jointe":""}`,
    d.urgent?{priority:"max",tags:"rotating_light"}:{});
  toast(
    d._urgentOnly ? "Urgence transmise — Thibaut est alerté 🚨"
    : d._sameDay===false ? "Journée pleine — reportée au prochain jour ✔"
    : d._base ? "Placée le matin (site du jour) ✔"
    : "Placée l'après-midi (autre site) ✔"
  );
  await load();
}

/* --- Déplacement prioritaire (Thibaut passe avant) --- */
function openPriorityMove(dateStr,newJob,clash){
  // créneaux libres de la semaine pour reloger l'intervention existante
  const dur=toMin(clash.end)-toMin(clash.start);          // durée requise (min)
  const ws=State.weekStart; const options=[];
  for(let i=0;i<CONFIG.HOURS.days;i++){
    const ds=iso(addDays(ws,i));
    dayTimeline(ds).forEach(it=>{                          // it.start/end sont en MINUTES
      if(it.free && (it.end-it.start)>=dur){
        options.push({date:ds,start:toHM(it.start),end:toHM(it.end)});
      }
    });
  }
  sheet.innerHTML=`
    <h3>Demande prioritaire</h3>
    <div class="sub">Ce créneau est déjà occupé. En tant que demande de Thibaut, choisissez où déplacer l'intervention existante.</div>
    <div class="conflict">À déplacer : <b>${esc(clash.title)}</b> — ${esc(clash.site)}, ${esc(clash.start)}–${esc(clash.end)}.<br>
      Elle sera remplacée par : <b>${esc(newJob.title)}</b> (${esc(newJob.start)}–${esc(newJob.end)}).</div>
    <div class="field"><label>Nouveau créneau pour « ${esc(clash.title)} » (${dur} min requis)</label>
      <div class="pick-list" id="pickList">
        ${options.length?options.map((o,i)=>`
          <div class="pick" data-i="${i}">
            <span>${DAYS_FR[new Date(o.date).getDay()]} ${fmtDay(new Date(o.date))}</span>
            <span class="mono">${o.start} → ${toHM(toMin(o.start)+dur)}</span>
          </div>`).join("")
        :`<div class="empty-day">Aucun créneau libre suffisant cette semaine. Choisis une autre semaine ou supprime l'existant.</div>`}
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn" id="p-cancel">Annuler</button>
      <button class="btn danger" id="p-go" ${options.length?"":"disabled"}>Déplacer & prioriser</button>
    </div>`;
  overlay.classList.add("open");
  let sel=-1;
  sheet.querySelectorAll(".pick").forEach(p=>p.onclick=()=>{
    sheet.querySelectorAll(".pick").forEach(x=>x.classList.remove("sel"));
    p.classList.add("sel"); sel=+p.dataset.i;
  });
  $("#p-cancel").onclick=closeSheet;
  $("#p-go").onclick=async()=>{
    if(sel<0){toast("Choisis un nouveau créneau",true);return;}
    const o=options[sel];
    // 1) déplacer l'existant
    await Store.update(clash.id,{date:o.date,start:o.start,end:toHM(toMin(o.start)+dur),
      notes:(clash.notes?clash.notes+" · ":"")+"Déplacé (priorité Thibaut)"});
    // 2) placer la demande prioritaire
    await Store.insert({date:dateStr,site:newJob.site,title:newJob.title,start:newJob.start,end:newJob.end,
      status:State.role==="admin"?"confirmed":"requested",priority:true,source:"adhoc",
      requested_by:newJob.by,notes:newJob.notes});
    closeSheet();
    await notify("🔴 PRIORITAIRE (Thibaut) — "+newJob.site,
      `${newJob.title}\n${DAYS_FR[new Date(dateStr).getDay()]} ${fmtDay(new Date(dateStr))} ${newJob.start}–${newJob.end}\n`+
      `⤷ « ${clash.title} » déplacée vers ${DAYS_FR[new Date(o.date).getDay()]} ${fmtDay(new Date(o.date))} ${o.start}`);
    toast("Priorité posée · intervention existante déplacée ✔");
    await load();
  };
}

async function saveSettingsFromDraft(draft){
  const names=draft.sites.map(s=>s.name.trim());
  if(!names.length){toast("Ajoute au moins un site",true);return;}
  if(names.some(n=>!n)){toast("Un site est sans nom",true);return;}
  if(new Set(names).size!==names.length){toast("Deux sites ont le même nom",true);return;}
  if(draft.rush.enabled && toMin(draft.rush.end)<=toMin(draft.rush.start)){toast("Rush : la fin doit être après le début",true);return;}
  if(draft.newPin&&draft.newPin.trim()&&draft.newPin.trim().length<6){toast("Le code doit faire au moins 6 caractères (évite un code trop court/devinable)",true);return;}
  const idToName={}; draft.sites.forEach((s,i)=>idToName[s.id]=names[i]);
  const renames=draft.sites.filter(s=>s.orig&&idToName[s.id]!==s.orig).map(s=>({from:s.orig,to:idToName[s.id]}));

  const newBase={}; for(let w=1;w<=5;w++){ const id=draft.baseSite[w]; newBase[w]= id&&idToName[id] ? idToName[id] : ""; }
  const newRec=draft.recurring.filter(r=>r.siteId&&idToName[r.siteId]&&r.title.trim())
    .map(r=>({site:idToName[r.siteId],title:r.title.trim(),weekday:+r.weekday,start:r.start,end:r.end,
      freq:r.freq===2?2:1,parity:r.freq===2?(r.parity==="odd"?"odd":"even"):"even"}));

  SETTINGS.sites=names.slice(); SETTINGS.baseSite=newBase; SETTINGS.recurring=newRec;
  { const dm={}; draft.sites.forEach((s,i)=>{ const dn=(s.dir||"").trim(); if(dn) dm[names[i]]=dn; }); SETTINGS.directors=dm; }
  SETTINGS.rush={enabled:!!draft.rush.enabled,start:draft.rush.start,end:draft.rush.end,label:SETTINGS.rush.label||"Rush cuisine"};
  if(draft.weeklyHours>0) SETTINGS.weeklyHours=draft.weeklyHours;
  if(draft.newPin&&draft.newPin.trim()) SETTINGS.pinHash=await sha256Hex(draft.newPin.trim());

  try{
    for(const r of renames){ if(Store.renameSite) await Store.renameSite(r.from,r.to); }
    await saveSettings();
    await cleanupRecurring();
    closeSheet(); bindSiteFilter(); toast("Paramètres enregistrés ✔"); await load();
  }catch(e){ console.warn(e); toast("Enregistrement impossible (table app_settings ?)",true); }
}

function download(name,text,mime){

async function openHeatmap(){
  const base=State.weekStart;
  const first=new Date(base.getFullYear(),base.getMonth(),1);
  const last=new Date(base.getFullYear(),base.getMonth()+1,0);
  let rows=[]; try{ rows=await Store.range(iso(first),iso(last)); }catch(e){}
  const count={}; rows.forEach(r=>{ if(r.status!=="cancelled"&&r.source!=="off"&&r.source!=="rush") count[r.date]=(count[r.date]||0)+1; });
  const max=Math.max(1,...Object.values(count));
  const lead=(first.getDay()+6)%7; // 0=lundi
  let cells="";
  for(let i=0;i<lead;i++) cells+=`<div class="hm-cell empty"></div>`;
  for(let day=1;day<=last.getDate();day++){
    const dObj=new Date(first.getFullYear(),first.getMonth(),day);

    const ds=iso(dObj);

    cells+=`<button class="hm-cell${weekend?" weekend":""}" data-d="${ds}" style="background:${bg}">
      <span class="hm-n">${day}</span>${n?`<span class="hm-c">${n}</span>`:""}</button>`;

    <div class="hm-grid-h">${["L","M","M","J","V","S","D"].map(x=>`<span>${x}</span>`).join("")}</div>

/* Bloque une période entière (jours ouvrés) :
   kind "off"  => absence/congé (exclu du placement auto)
   kind "site" => chantier sur un site (journée occupée par du travail)  */
async function blockPeriod(fromISO,toISO,opt){
  opt=opt||{};
  const end=new Date(toISO||fromISO);
  let d=new Date(fromISO);
  const days=[];
  while(d<=end){ if(isWorkday(d)) days.push(iso(d)); d=addDays(d,1); }
  if(!days.length) return {n:0,removed:0,failed:0};

  // Retire ce qui occupe déjà ces journées (sinon l'anti-chevauchement refuse)
  let removed=0;
  for(const ds of days){
    let existing=[];
    try{ existing=await Store.range(ds,ds); }catch(e){}
    for(const r of existing.filter(r=>r.status!=="cancelled"&&r.source!=="rush")){
      try{ await Store.remove(r.id); removed++; }catch(e){ console.warn(e); }
    }
  }
  let n=0, failed=0;
  // Une journée bloquée occupe 07:00–16:00 : elle recouvre le rush → on le retire ces jours-là
  if(rushInterval()){
    if(!Array.isArray(SETTINGS.rushOff)) SETTINGS.rushOff=[];
    let changed=false;
    days.forEach(ds=>{ if(!SETTINGS.rushOff.includes(ds)){ SETTINGS.rushOff.push(ds); changed=true; } });
    if(changed){ try{ await saveSettings(); }catch(e){ console.warn(e); } }
  }
  for(const ds of days){
    const row = opt.kind==="site"
      ? {date:ds,site:opt.site,title:opt.label||("Chantier — "+opt.site),start:openHM(),end:closeHM(),
         status:"confirmed",priority:false,source:"adhoc",requested_by:"Responsable",notes:opt.notes||""}
      : {date:ds,site:"—",title:opt.label||"Absence / Congé",start:openHM(),end:closeHM(),
         status:"planned",priority:false,source:"off",requested_by:"",notes:opt.notes||""};
    try{ await Store.insert(row); n++; }catch(e){ console.warn(e); failed++; }
  }
  return {n,removed,failed};
}

/* --- Exports : CSV / JSON / iCal ---------------------------------------- */
async function exportData(kind){
  const from=iso(addDays(new Date(),-30)), to=iso(addDays(new Date(),180));
  let rows=[]; try{ rows=await Store.range(from,to); }catch(e){ toast("Export impossible",true); return; }
  rows=rows.filter(r=>r.status!=="cancelled").sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:toMin(a.start)-toMin(b.start));
  if(kind==="json"){ download("planning.json",JSON.stringify(rows,null,2),"application/json"); return; }
  if(kind==="csv"){
    const esc2=v=>`"${String(v??"").replace(/"/g,'""')}"`;
    const head=["date","site","objet","debut","fin","statut","demande_par","notes"];
    const lines=[head.join(",")].concat(rows.map(r=>[r.date,r.site,r.title,r.start,r.end,r.status,r.requested_by,r.notes].map(esc2).join(",")));
    download("planning.csv","\uFEFF"+lines.join("\r\n"),"text/csv"); return;
  }
  if(kind==="ics"){
    const dt=(date,hm)=>date.replace(/-/g,"")+"T"+hm.replace(":","")+"00";
    const evs=rows.filter(r=>r.source!=="off"&&r.source!=="rush").map((r,i)=>
`BEGIN:VEVENT
UID:planning-${r.id||i}@lacote
DTSTAMP:${dt(iso(new Date()),"00:00")}
DTSTART:${dt(r.date,r.start)}
DTEND:${dt(r.date,r.end)}
SUMMARY:${(r.title||"").replace(/\n/g," ")} — ${r.site||""}
STATUS:${r.status==="confirmed"?"CONFIRMED":"TENTATIVE"}
DESCRIPTION:${((r.notes||"")+(r.requested_by?(" · "+r.requested_by):"")).replace(/\n/g," ")}
END:VEVENT`).join("\n");
    const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Planning La Cote//FR\nCALSCALE:GREGORIAN\n${evs}\nEND:VCALENDAR`;
    download("planning.ics",ics,"text/calendar"); return;
  }
}

/* --- Nettoyage des récurrences obsolètes (idée 8) ---------------------- */
async function cleanupRecurring(){
  try{
    const today=iso(new Date());
    const rows=await Store.range(today,iso(addDays(new Date(),120)));
    for(const r of rows.filter(r=>r.source==="template")){
      const dd=new Date(r.date); const wd=(dd.getDay()+6)%7+1; const wn=weekNum(dd);
      const match=SETTINGS.recurring.some(t=>{
        if(t.site!==r.site||t.title!==r.title||t.start!==r.start||Number(t.weekday)!==wd) return false;
        if(Number(t.freq)===2){ const even=wn%2===0; if(((t.parity==="odd")?!even:even)===false) return false; }
        return true;
      });
      if(!match) await Store.remove(r.id);
    }
  }catch(e){ console.warn("cleanupRecurring",e); }
}

  if(!SB){ toast("Connexion e-mail indisponible en mode démo",true); return; }
  if(!email||!email.includes("@")){ toast("E-mail invalide",true); return; }
  const {error}=await SB.auth.signInWithOtp({email:email.trim(),options:{emailRedirectTo:location.href}});
  if(error) toast("Envoi impossible : "+error.message,true);
  else toast("Lien de connexion envoyé par e-mail ✔");
}
let AUTHED=false;
async function authCheck(){
  if(!SB) return;
  try{
    const {data}=await SB.auth.getSession();
    if(data&&data.session){ AUTHED=true; State.role="admin"; }
    SB.auth.onAuthStateChange((_e,sess)=>{ AUTHED=!!sess; if(sess){ State.role="admin"; } render(); });
  }catch(e){ console.warn("authCheck",e); }
}
async function authSignOut(){
  try{ if(SB) await SB.auth.signOut(); }catch(e){}
  AUTHED=false; State.role="directeur"; render(); toast("Déconnecté");
}

/* --- Journal des modifications (idée 11) --- */
async function openAudit(){
  if(!SB){ toast("Journal indisponible en mode démo",true); return; }
  let rows=[];
  try{
    const {data,error}=await SB.from("audit").select("*").order("at",{ascending:false}).limit(60);
    if(error) throw error; rows=data||[];
  }catch(e){ console.warn(e); toast("Journal illisible — connecte-toi par e-mail (⚙ Paramètres)",true); return; }
  const line=r=>{
    const d=new Date(r.at);
    const act={INSERT:"➕ créé",UPDATE:"✏️ modifié",DELETE:"🗑 supprimé"}[r.action]||esc(r.action);
    const obj=(r.after&&r.after.title)||(r.before&&r.before.title)||r.table_name;
    return `<div class="tour-item"><b>${act}</b> · ${esc(obj)}<br>
      <span class="meta">${d.toLocaleString("fr-FR")} · ${esc(r.actor||"?")}</span></div>`;
  };
  sheet.innerHTML=`<h3>🧾 Journal des modifications</h3>
    <div class="sub">60 dernières actions serveur</div>
    ${rows.length?rows.map(line).join(""):`<div class="set-note">Journal vide (ou table absente — lance le SQL à jour).</div>`}
    <div class="sheet-actions"><button class="btn primary" id="au-close">Fermer</button></div>`;
  overlay.classList.add("open");
  $("#au-close").onclick=closeSheet;
}

/* ================================================================== NAV / UI */
function bindSiteFilter(){
  const sel=$("#siteFilter"); if(!sel) return;
  const cur=sel.value||"__all__";
  sel.innerHTML=`<option value="__all__">Tous les sites</option>`+SETTINGS.sites.map(s=>`<option>${esc(s)}</option>`).join("");
  sel.value=[...sel.options].some(o=>o.value===cur)?cur:"__all__";
}
function bindMonthPick(){
  const sel=$("#monthPick"); if(!sel) return;
  const now=new Date();
  let html="";
  for(let i=-2;i<12;i++){   // 2 mois passés + 12 mois à venir
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    html+=`<option value="${d.getFullYear()}-${pad(d.getMonth()+1)}">${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}</option>`;
  }
  sel.innerHTML=html;
}
function bindUI(){
  $("#prevWeek").onclick=()=>{State.weekStart=addDays(State.weekStart,-7);load();};
  $("#nextWeek").onclick=()=>{State.weekStart=addDays(State.weekStart,7);load();};
  $("#todayBtn").onclick=()=>{State.weekStart=mondayOf(new Date());load();};
  bindMonthPick();
  $("#monthPick").onchange=e=>{
    const v=e.target.value; if(!v) return;
    const [y,m]=v.split("-").map(Number);
    if(!y||!m) return;
    let ws=mondayOf(new Date(y,m-1,1));
    if(ws.getMonth()!==m-1) ws=addDays(ws,7);   // éviter de retomber sur le mois précédent
    State.weekStart=ws;
    load();
  };
  $("#addBtn").onclick=()=>openEdit(null);
  $("#settingsBtn").onclick=openSettings;
  $("#tourBtn").onclick=()=>openTour();
  $("#monthBtn").onclick=openHeatmap;
  $("#reportBtn").onclick=openReport;
  $("#myReqBtn").onclick=openMyRequests;

  bindSiteFilter();
  const sel=$("#siteFilter");
  sel.onchange=()=>{State.site=sel.value;render();};

  $("#btnDirecteur").onclick=()=>{
    if(State.role!=="directeur"){State.role="directeur";toast("Mode directeur");render();}
  };
  $("#btnResponsable").onclick=async()=>{
    if(State.role==="admin") return;
    const pin=prompt("Code responsable :");
    if(pin===null) return;
    const target = SETTINGS.pinHash || CONFIG.ADMIN_PIN_HASH;
    if(await sha256Hex(pin)===target){State.role="admin";toast("Mode responsable activé");render();}
    else toast("Code incorrect",true);
  };

  $("#footer").innerHTML = supaOn
    ? `Partagé en temps réel · alertes ${CONFIG.NTFY_TOPIC?"ntfy":""}${CONFIG.NTFY_TOPIC&&CONFIG.N8N_WEBHOOK?" + ":""}${CONFIG.N8N_WEBHOOK?"n8n":""}${!CONFIG.NTFY_TOPIC&&!CONFIG.N8N_WEBHOOK?"non configurées":""}`
    : `Mode démo local — configure Supabase pour partager entre les sites`;
}

/* ===================================================================== BOOT */
async function boot(){
  Store=makeStore();
  await loadSettings();
  await authCheck();
  bindUI();
  Store.subscribe && Store.subscribe(()=>load());
  subscribeSettings();
  outboxBadge();
  window.addEventListener("online", flushOutbox);
  window.addEventListener("offline", ()=>toast("Hors-ligne — les demandes seront mises en file"));
  await load();
  flushOutbox();
}
/* Service Worker (PWA / offline) — sans effet si sw.js absent */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

/* Charge le SDK Supabase si configuré, PUIS démarre (après toutes les déclarations) */
(function start(){
  if(supaOn){
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
    s.onload=boot;
    s.onerror=()=>{console.warn("Supabase indisponible → mode démo");window.__supaFail=true;boot();};
    document.head.appendChild(s);
  } else { boot(); }
})();
</script>
</body>
